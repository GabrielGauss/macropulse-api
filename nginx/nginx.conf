# ── MacroPulse production nginx config ──────────────────────────────
# Serves api.macropulse.live with SSL termination via Let's Encrypt.
# HTTP → HTTPS redirect + ACME challenge passthrough for cert renewal.

# ── HTTP: redirect + ACME challenge ─────────────────────────────────
server {
    listen 80;
    server_name api.macropulse.live;

    # Let's Encrypt webroot challenge (certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: full API reverse proxy ───────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.macropulse.live;

    ssl_certificate     /etc/letsencrypt/live/api.macropulse.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.macropulse.live/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;
    # FUTURE: when Phase 10 (Paddle Billing) ships, add frame-src https://checkout.paddle.com
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss://api.macropulse.live https://api.macropulse.live; font-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

    # Gzip API responses
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 512;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    client_max_body_size 2M;

    # WebSocket (live regime stream)
    location /ws/ {
        proxy_pass          http://api:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400s;
    }

    # All other traffic → FastAPI
    location / {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
