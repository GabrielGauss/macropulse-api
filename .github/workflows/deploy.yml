name: Deploy to production

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  deploy:
    # Only run in the private repo — public mirror doesn't have VPS secrets
    if: github.repository == 'GabrielGauss/macropulse'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/macropulse

            # Sync to latest remote — discard any locally SCP'd files
            git fetch origin master
            git reset --hard origin/master

            # Rebuild and restart only the API container
            # (DB and nginx keep running — no downtime)
            docker compose build --no-cache api
            docker compose up -d --no-deps api

            # Verify health
            sleep 10
            curl -sf http://localhost:8000/health || exit 1

            echo "Deploy successful"
